<!DOCTYPE html>
<html>
<head>
    <title>File Complaint</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h3>📝 File Complaint</h3>

<form method="POST">

    <input type="text" name="area" placeholder="Enter Area" class="form-control mb-3" required>

    <textarea name="issue" placeholder="Describe Issue" class="form-control mb-3" required></textarea>

    <select name="priority" class="form-control mb-3">
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
    </select>

    <button class="btn btn-primary">Submit Complaint</button>

</form>

</body>
</html>
