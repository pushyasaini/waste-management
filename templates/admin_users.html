<!DOCTYPE html>
<html>
<head>
    <title>Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h3>👥 Registered Users</h3>

<table class="table table-bordered mt-3">
    <tr>
        <th>Username</th>
        <th>Role</th>
        <th>Action</th>
    </tr>

    {% for u in users %}
    <tr>
        <td>{{ u.username }}</td>
        <td>{{ u.role }}</td>
        <td>
            <a href="/delete_user/{{ u.username }}" class="btn btn-danger btn-sm">Delete</a>
        </td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
