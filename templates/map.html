<!DOCTYPE html>
<html>
<head>
    <title>Live Waste Map</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            width: 220px;
            position: fixed;
            background: #002244;
            color: white;
            padding: 15px;
        }

        .sidebar h4 {
            margin-bottom: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px;
            text-decoration: none;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background: #00509e;
        }

        /* Main Content */
        .main {
            margin-left: 220px;
            padding: 20px;
            background: #f4f6f9;
            min-height: 100vh;
        }

        .card {
            border-radius: 15px;
            padding: 15px;
        }

        iframe {
            width: 100%;
            height: 75vh;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>GHMC Admin</h4>
    <a href="/admin_dashboard">Dashboard</a>
    <a href="/manage_complaints">Manage Complaints</a>
    <a href="/live_map">Live Waste Map</a>
    <a href="/admin/qr-bins">QR Bin System</a>
    <a href="/waste_forecast">Waste Forecast</a>
    <a href="/route_optimization">Route Optimization</a>
    <a href="/logout">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

    <h3 class="mb-4">🚛 Live Waste Monitoring Map</h3>

    <div class="card shadow">
        {{ map_html | safe }}
    </div>

</div>

</body>
</html>
