<!DOCTYPE html>
<html>
<head>
    <title>GHMC Admin Login</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #002244, #00509e);
            height: 100vh;
        }
        .login-card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .logo {
            width: 80px;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="card login-card p-4" style="width:400px;">
    <div class="text-center mb-3">
        <img src="{{ url_for('static', filename='ghmc_logo.png') }}" class="logo">
        <h4 class="mt-2">GHMC Administration</h4>
        <small class="text-muted">Central Command & Control</small>
    </div>

    <form method="POST" action="/admin_login">
        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Admin ID" required>
        </div>
        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>
        <button class="btn btn-primary w-100">Secure Login</button>
    </form>
</div>

</body>
</html>
