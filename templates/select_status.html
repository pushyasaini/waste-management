<!DOCTYPE html>
<html>
<head>
    <title>Select Bin Status</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        h2 {
            color: #333;
        }

        .btn {
            padding: 15px 30px;
            margin: 10px;
            border: none;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
        }

        .empty {
            background-color: #28a745;
            color: white;
        }

        .half {
            background-color: #ffc107;
            color: black;
        }

        .full {
            background-color: #dc3545;
            color: white;
        }

        .btn:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>

<h2>🗑 Bin ID: {{ bin_id }}</h2>

<form method="POST">

    <!-- ✅ NAME -->
    <input type="text" name="name" placeholder="Enter your name" required><br><br>

    <!-- ✅ PRIORITY -->
    <select name="priority" required>
        <option value="">Select Priority</option>
        <option value="IMMEDIATE">Immediate</option>
        <option value="TODAY">Today</option>
        <option value="TOMORROW">Tomorrow</option>
    </select>

    <br><br>

    <h3>Select Status</h3>

    <!-- ✅ SUBMIT BUTTONS -->
    <button type="submit" name="status" value="EMPTY" class="btn empty">🟢 Empty</button>

    <button type="submit" name="status" value="HALF" class="btn half">🟡 Half Full</button>

    <button type="submit" name="status" value="FULL" class="btn full">🔴 Full</button>

</form>

</body>
</html>
