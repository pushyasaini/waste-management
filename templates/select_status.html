<!DOCTYPE html>
<html>
<head>
    <title>Select Bin Status</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        h2 {
            color: #333;
        }

        input, select {
            padding: 10px;
            margin: 10px;
            width: 250px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .btn {
            padding: 15px 30px;
            margin: 10px;
            border: none;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
        }

        .empty {
            background-color: #28a745;
            color: white;
        }

        .half {
            background-color: #ffc107;
            color: black;
        }

        .full {
            background-color: #dc3545;
            color: white;
        }

        .btn:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>

<h2>🗑 Bin ID: {{ bin_id }}</h2>

<form method="POST">

    <!-- ✅ NAME -->
    <input type="text" name="name" placeholder="Enter your name" required>

    <br>

    <!-- ✅ PRIORITY -->
    <select name="priority" required>
        <option value="">Select Priority</option>
        <option value="IMMEDIATE">Immediate</option>
        <option value="TODAY">Today</option>
        <option value="TOMORROW">Tomorrow</option>
    </select>

    <br>

    <h3>Select Status</h3>

    <!-- ✅ IMPORTANT: hidden field to store status -->
    <input type="hidden" name="status" id="statusInput">

    <!-- ✅ BUTTONS -->
    <button type="submit" class="btn empty" onclick="setStatus('EMPTY')">🟢 Empty</button>

    <button type="submit" class="btn half" onclick="setStatus('HALF')">🟡 Half Full</button>

    <button type="submit" class="btn full" onclick="setStatus('FULL')">🔴 Full</button>

</form>

<script>
function setStatus(value) {
    document.getElementById("statusInput").value = value;
}
</script>

</body>
</html>
